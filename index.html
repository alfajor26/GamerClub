<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamers Club Store</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0e0e0e;
  color:white;
}

header{
  text-align:center;
  padding:20px;
}

h1{
  font-size:28px;
  margin:0;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:20px;
}

.card{
  width:220px;
  background:#1a1a1a;
  border-radius:8px;
  overflow:hidden;
  text-align:center;
}

.card img{
  width:100%;
}

.info{
  padding:10px;
}

.price{
  color:#00ff88;
  font-weight:bold;
}

button{
  background:#00ff88;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
  margin-top:5px;
}

</style>
</head>
<body>

<header>
<h1>CATÁLOGO DE JUEGOS</h1>
<p>Elegí tu pack</p>
</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/220x120">
<div class="info">
<h3>1 Juego Random</h3>
<p class="price">$5000</p>
<button>Comprar</button>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/220x120">
<div class="info">
<h3>3 Juegos Random</h3>
<p class="price">$10000</p>
<button>Comprar</button>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/220x120">
<div class="info">
<h3>10 Juegos Random</h3>
<p class="price">$20000</p>
<button>Comprar</button>
</div>
</div>

</div>

</body>
</html>
